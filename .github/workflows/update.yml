name: Find Politepaul

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run analyzer
        run: python find_politepaul.py > results.txt

      - name: Push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results.txt
          git commit -m "politepaul results" || echo "No changes"
          git push
